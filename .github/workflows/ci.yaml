name: Polyglot Migration CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  node-tests:
    name: Node.js Tests
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test
      CI: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Run Jest Tests
        run: npm test

  c-build:
    name: C Build Pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install GCC
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc

      - name: Detect C files
        run: |
          echo "Scanning for C files..."
          find . -name "*.c"
          find . -name "*.h"

      - name: Compile C Application
        run: |
          mkdir -p build

          C_FILES=$(find . -name "*.c")

          if [ -z "$C_FILES" ]; then
            echo "ERROR: No C source files found"
            exit 1
          fi

          echo "Compiling:"
          echo "$C_FILES"

          gcc $C_FILES -o build/app

      - name: Verify Binary
        run: |
          if [ ! -f build/app ]; then
            echo "ERROR: build/app was not created"
            exit 1
          fi

          echo "Binary created successfully"

      - name: Run C Application
        run: |
          chmod +x build/app
          ./build/app

  migration-validation:
    name: Migration Validation
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test
      CI: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Run Migration Engine
        run: node src/index.js