name: Polyglot Migration CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  node-tests:
    name: Node.js Tests
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test
      CI: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Run Jest Tests
        run: npm test

  c-build:
    name: C Build Pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install GCC
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc

      - name: Detect C files
        run: |
          C_FILES=$(find . -name "*.c")
          echo "C files found:"
          echo "$C_FILES"

      - name: Compile C Application Safely
        run: |
          mkdir -p build

          C_FILES=$(find . -name "*.c")

          if [ -z "$C_FILES" ]; then
            echo "No C files found, skipping build"
            exit 0
          fi

          gcc $C_FILES -o build/app

      - name: Run C Application (safe)
        run: |
          if [ -f build/app ]; then
            ./build/app
          else
            echo "No binary to run"
          fi

  migration-validation:
    name: Migration Validation
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test
      CI: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Run Migration Engine
        run: node src/index.js