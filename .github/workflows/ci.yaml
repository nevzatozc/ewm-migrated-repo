name: Polyglot Migration CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  node-tests:
    name: Node.js Tests
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test
      CI: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Run Jest Tests
        run: npm test

  c-build:
    name: C Build Pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install GCC
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc

      - name: Compile C Application
        run: |
          mkdir -p build
          gcc $(find . -name "*.c") -o build/app
      - name: List C files
        run: find . -name "*.c"

      - name: Run C Application
        run: |
          ./build/app

  migration-validation:
    name: Migration Validation
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test
      CI: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Run Migration Engine
        run: node src/index.js